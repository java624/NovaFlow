<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaFlow - Вхід до кабінету</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-body">

  <!-- Page: login.html — Login page -->
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <div class="auth-subtitle">Вхід до твого мовного простору NovaFlow</div>
    
    <form id="login-form">
      <div class="auth-input-group">
        <label>Електронна пошта</label>
        <input type="email" id="login-email" placeholder="your.email@example.com" required>
      </div>
      
      <div class="auth-input-group password-field">
        <label>Пароль</label>
        <input type="password" id="login-password" class="password-input" placeholder="••••••••" required>
        <i class="fa-solid fa-eye toggle-password-icon password-toggle-icon"></i>
      </div>
      
      <button type="submit" class="auth-btn-submit">Увійти в кабінет</button>
    </form>
    
    <div class="auth-switch-text">
      Ще немає акаунту? <a href="register.html">Створити зараз</a>
    </div>
    <div id="login-message" class="auth-status-msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
  
</body>
</html>
