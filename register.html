<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaFlow - Реєстрація учня</title>
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="auth-body">

  <!-- Page: register.html — Registration page -->
  <div class="auth-card">
    <h2>Start Your Journey</h2>
    <div class="auth-subtitle">Створи акаунт для доступу до інтерактивного кабінету</div>
    
    <form id="register-form">
      <div class="auth-input-group">
        <label>Повне ім'я та прізвище</label>
        <input type="text" id="reg-name" placeholder="Олександр Коваленко" required>
      </div>
      
      <div class="auth-input-group">
        <label>Електронна пошта</label>
        <input type="email" id="reg-email" placeholder="your.email@example.com" required>
      </div>
      
      <div class="auth-input-group password-field">
        <label>Пароль</label>
        <input type="password" id="reg-password" class="password-input" placeholder="Мінімум 6 символів" required>
        <i class="fa-solid fa-eye toggle-password-icon password-toggle-icon"></i>
      </div>
      
      <button type="submit" class="auth-btn-submit">Зареєструватися</button>
    </form>
    
    <div class="auth-switch-text">
      Вже є акаунт? <a href="login.html">Увійти</a>
    </div>
    <div id="reg-message" class="auth-status-msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>
